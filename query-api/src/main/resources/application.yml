server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: query-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemetry}
    username: ${DB_USER:telemetry}
    password: ${DB_PASSWORD:telemetry_pass}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_query
    baseline-version: 0

  # Redis (Phase 4 — disabled until Redis is needed)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

# --- Simulator proxy ---
simulator:
  base-url: ${SIMULATOR_BASE_URL:http://localhost:8081}

# --- CORS ---
cors:
  allowed-origins: ${CORS_ORIGINS:*}

# --- Cache TTL ---
cache-config:
  latest-readings-ttl-seconds: ${CACHE_TTL:5}

# --- Actuator / Prometheus ---
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: query-api

logging:
  level:
    com.ntpc.queryapi: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
