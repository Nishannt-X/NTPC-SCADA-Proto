version: '3.8'

services:
  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  # Apache Kafka — KRaft mode (no Zookeeper)
  kafka:
    image: apache/kafka:3.8.1
    container_name: ntpc-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - telemetry-net
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # TimescaleDB (PostgreSQL 15 + TimescaleDB extension)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: ntpc-timescaledb
    hostname: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-telemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telemetry_pass}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - telemetry-net
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-telemetry} -d ${POSTGRES_DB:-telemetry}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ntpc-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - telemetry-net
    healthcheck:
      test: redis-cli ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


  # =============================================================================
  # APPLICATION SERVICES
  # =============================================================================

  # Sensor Simulator — generates synthetic sensor readings
  sensor-simulator:
    build: ./sensor-simulator
    container_name: ntpc-sensor-simulator
    hostname: sensor-simulator
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SIMULATOR_INTERVAL_MS: 3000
      SIMULATOR_TOPIC: sensor-readings
    networks:
      - telemetry-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # Ingestion Service — persists sensor readings to TimescaleDB
  ingestion-service:
    build: ./ingestion-service
    container_name: ntpc-ingestion-service
    hostname: ingestion-service
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: telemetry
      DB_USER: telemetry
      DB_PASSWORD: telemetry_pass
      INGESTION_TOPIC: sensor-readings
      INGESTION_BATCH_SIZE: 50
      INGESTION_FLUSH_INTERVAL_MS: 1000
    networks:
      - telemetry-net
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: on-failure

  # Anomaly Detection Service — evaluates readings and publishes alerts
  anomaly-detection-service:
    build: ./anomaly-detection-service
    container_name: ntpc-anomaly-detection
    hostname: anomaly-detection-service
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ANOMALY_READINGS_TOPIC: sensor-readings
      ANOMALY_ALERTS_TOPIC: sensor-alerts
      ANOMALY_CONSECUTIVE_BREACHES: 2
    networks:
      - telemetry-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # Alerting Service — deduplicates, persists, and stubs notifications
  alerting-service:
    build: ./alerting-service
    container_name: ntpc-alerting-service
    hostname: alerting-service
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: telemetry
      DB_USER: telemetry
      DB_PASSWORD: telemetry_pass
      ALERTING_TOPIC: sensor-alerts
      ALERTING_DEDUP_WINDOW_MINUTES: 5
      ALERTING_AUTO_RESOLVE_MINUTES: 2
    networks:
      - telemetry-net
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: on-failure

  # Query API — REST API for the frontend
  query-api:
    build: ./query-api
    container_name: ntpc-query-api
    hostname: query-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: telemetry
      DB_USER: telemetry
      DB_PASSWORD: telemetry_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SIMULATOR_BASE_URL: http://sensor-simulator:8081
      ML_INFERENCE_BASE_URL: http://ml-inference:8090
      CORS_ORIGINS: "*"
      CACHE_TTL: 5
    networks:
      - telemetry-net
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      sensor-simulator:
        condition: service_started
    restart: on-failure

  # Kafka Setup - Creates topics automatically on startup
  kafka-setup:
    image: apache/kafka:3.8.1
    container_name: ntpc-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - telemetry-net
    command: >
      bash -c '
      echo "Waiting for Kafka to be ready...";
      sleep 15;
      echo "Creating topics...";
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic telemetry.fuel --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic telemetry.boiler --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic telemetry.turbine --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic telemetry.water --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic telemetry.electrical --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic telemetry.emissions --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic sensor-alerts --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic alert-lifecycle-events --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic threshold-override-events --config retention.ms=604800000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic maintenance-events --config retention.ms=2592000000;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic shift-handover-events --config retention.ms=31536000000;
      echo "Topics created."
      '

  # ML Predictive Maintenance Inference Service
  ml-inference:
    build: ./ml-predictive
    container_name: ntpc-ml-inference
    hostname: ml-inference
    ports:
      - "8090:8090"
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-telemetry}
      DB_USER: ${POSTGRES_USER:-telemetry}
      DB_PASS: ${POSTGRES_PASSWORD:-telemetry_pass}
      MODEL_DIR: models
    networks:
      - telemetry-net
    depends_on:
      timescaledb:
        condition: service_healthy

# =============================================================================
# Volumes
# =============================================================================
volumes:
  kafka-data:
    driver: local
  timescaledb-data:
    driver: local
  redis-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  telemetry-net:
    driver: bridge
    name: telemetry-net
