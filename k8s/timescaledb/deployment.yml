apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: ntpc-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "telemetry"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ntpc-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ntpc-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: tsdb-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "telemetry", "-d", "telemetry"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: tsdb-data
          persistentVolumeClaim:
            claimName: timescaledb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: ntpc-telemetry
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: ntpc-telemetry
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
