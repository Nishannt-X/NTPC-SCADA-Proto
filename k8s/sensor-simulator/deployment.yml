apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-simulator
  namespace: ntpc-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-simulator
  template:
    metadata:
      labels:
        app: sensor-simulator
    spec:
      containers:
        - name: sensor-simulator
          image: ntpc/sensor-simulator:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: ntpc-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: sensor-simulator
  namespace: ntpc-telemetry
spec:
  selector:
    app: sensor-simulator
  ports:
    - port: 8081
      targetPort: 8081
