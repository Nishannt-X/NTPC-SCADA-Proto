apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detection-service
  namespace: ntpc-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detection-service
  template:
    metadata:
      labels:
        app: anomaly-detection-service
    spec:
      containers:
        - name: anomaly-detection-service
          image: ntpc/anomaly-detection-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: ntpc-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detection-service
  namespace: ntpc-telemetry
spec:
  selector:
    app: anomaly-detection-service
  ports:
    - port: 8083
      targetPort: 8083
