server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ingestion-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ingestion-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.ntpc.ingestion.dto.TelemetryEnvelope
        spring.json.use.type.headers: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemetry}?reWriteBatchedInserts=true
    username: ${DB_USER:telemetry}
    password: ${DB_PASSWORD:telemetry_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# --- Ingestion Configuration ---
ingestion:
  topic: ${INGESTION_TOPIC:sensor-readings}
  batch-size: ${INGESTION_BATCH_SIZE:50}
  flush-interval-ms: ${INGESTION_FLUSH_INTERVAL_MS:1000}

# --- Actuator / Prometheus ---
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ingestion-service

logging:
  level:
    com.ntpc.ingestion: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
